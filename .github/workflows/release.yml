# Build Bun standalone binaries and attach them to a GitHub Release when you push a version tag (e.g. v0.2.0).
#
# Prerequisites: default GITHUB_TOKEN with contents: write (enabled for tags on the repo).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: toby-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: toby-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: toby-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: toby-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: toby-*
          merge-multiple: true

      - name: List release files
        run: ls -la release-assets/

      - name: Build release notes from commits since previous tag
        run: |
          python - <<'PY'
          import os
          import subprocess

          current_tag = os.environ.get("GITHUB_REF_NAME", "")

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          all_tags_output = git("tag", "--sort=-creatordate")
          all_tags = [tag for tag in all_tags_output.splitlines() if tag]
          previous_tag = next((tag for tag in all_tags if tag != current_tag), "")

          if previous_tag:
              commit_lines = git(
                  "log",
                  f"{previous_tag}..{current_tag}",
                  "--pretty=format:- %s (%h)",
              )
              heading = f"## Changes since {previous_tag}\n"
              compare_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/compare/{previous_tag}...{current_tag}"
              compare = f"\n[Full diff]({compare_url})\n"
          else:
              commit_lines = git(
                  "log",
                  current_tag,
                  "--pretty=format:- %s (%h)",
              )
              heading = "## Changes in this release\n"
              compare = ""

          body = heading + "\n" + (commit_lines if commit_lines else "- No commit messages found.") + "\n" + compare

          with open("release-notes.md", "w", encoding="utf-8") as f:
              f.write(body)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: release-assets/toby-*
