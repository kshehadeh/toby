# Build Bun standalone binaries and attach them to a GitHub Release when you push a version tag (e.g. v0.2.0).
#
# Prerequisites: default GITHUB_TOKEN with contents: write (enabled for tags on the repo).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: toby-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: toby-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: toby-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: toby-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: toby-*
          merge-multiple: true

      - name: List release files
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/toby-*
